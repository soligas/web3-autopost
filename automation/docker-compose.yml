version: '3.8'

services:
  # ============================================
  # n8n - Motor de automatización (GRATIS)
  # ============================================
  n8n:
    image: n8nio/n8n:latest
    container_name: web3-autopost-n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=America/Bogota
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=web3autopost2026
      - DB_TYPE=sqlite
      - N8N_USER_FOLDER=/home/node/.n8n
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/web3-autopost-flow.json:/home/node/.n8n/workflows/web3-autopost-flow.json
    networks:
      - web3-network

volumes:
  n8n_data:
    driver: local

networks:
  web3-network:
    driver: bridge
