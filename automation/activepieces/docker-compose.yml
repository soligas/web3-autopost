# ============================================
# WEB3 AUTOPOST - ActivePieces (GRATIS)
# Motor de automatización open source
# ============================================
services:
  activepieces:
    image: ghcr.io/activepieces/activepieces:latest
    container_name: web3-autopost-activepieces
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      - AP_ENVIRONMENT=prod
      - AP_FRONTEND_URL=http://localhost:8080
      - AP_EXECUTION_MODE=UNSANDBOXED
      - AP_POSTGRES_DATABASE=activepieces
      - AP_POSTGRES_HOST=postgres
      - AP_POSTGRES_PORT=5432
      - AP_POSTGRES_USERNAME=postgres
      - AP_POSTGRES_PASSWORD=web3autopost2026
      - AP_REDIS_HOST=redis
      - AP_REDIS_PORT=6379
      - AP_JWT_SECRET=web3autopost-secret-key-2026
      - GENERIC_TIMEZONE=America/Bogota
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:14.4
    container_name: web3-autopost-postgres
    environment:
      - POSTGRES_DB=activepieces
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=web3autopost2026
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7.0.8
    container_name: web3-autopost-redis
    volumes:
      - ./redis-data:/data
    restart: unless-stopped
